apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinai-ui-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: sentinai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinai-ui-service
                port:
                  number: 80
